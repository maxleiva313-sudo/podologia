kind = "web"
previewPath = "/"
title = "PodoClinic — Sistema de Gestión"
version = "1.0.0"
id = "artifacts/podologia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22988

[services.development]
run = "pnpm --filter @workspace/podologia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/podologia", "run", "build" ]
publicDir = "artifacts/podologia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22988"
BASE_PATH = "/"
